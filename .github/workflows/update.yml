name: Update Hot Rankings Dashboard

on:
  schedule:
    # 北京时间 18:00 = UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch data and generate HTML
        run: python3 fetch_and_generate.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "auto update: $(date -u +%Y-%m-%d)"
          git push
